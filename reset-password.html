<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore Passkey | Crypto Mining Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #030308;
            margin: 0;
            padding: 24px;
        }
        .reset-card {
            background: rgba(8, 8, 22, 0.95) !important;
            border: 1px solid rgba(0, 240, 255, 0.3) !important;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,240,255,0.05);
            text-align: center;
        }
        .reset-header h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .reset-header p {
            color: #cbd5e1;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .message-box {
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .message-box.error {
            background: rgba(255, 56, 56, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            display: block;
        }
        .message-box.success {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            display: block;
        }
        .btn-full {
            width: 100%;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="reset-card">
        <div class="reset-header">
            <h3 class="font-blue"><i class="fa-solid fa-key"></i> Restore Access Passkey</h3>
            <p>Enter your new secure passkey below to regain node management authority</p>
        </div>
        
        <div id="message" class="message-box"></div>
        
        <form id="reset-form" onsubmit="handleResetSubmit(event)">
            <div class="form-group" style="text-align: left;">
                <label for="new-password" style="color: #ffffff;">New Passkey</label>
                <div class="input-icon-wrap" style="margin-top: 8px;">
                    <i class="fa-solid fa-lock" style="color: var(--accent-blue);"></i>
                    <input type="password" id="new-password" placeholder="Min. 8 chars (A-Z, a-z, 0-9)" required style="color: #ffffff; border-color: rgba(255,255,255,0.25);">
                </div>
            </div>
            
            <div class="form-group mt-3" style="text-align: left;">
                <label for="confirm-password" style="color: #ffffff;">Confirm Passkey</label>
                <div class="input-icon-wrap" style="margin-top: 8px;">
                    <i class="fa-solid fa-lock" style="color: var(--accent-blue);"></i>
                    <input type="password" id="confirm-password" placeholder="Confirm new passkey" required style="color: #ffffff; border-color: rgba(255,255,255,0.25);">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full mt-4" style="background: var(--accent-blue) !important; color: #030308 !important; font-weight: 700;">
                Restore Passkey <i class="fa-solid fa-shield-halved icon-right"></i>
            </button>
        </form>
        
        <div class="mt-4">
            <a href="/" class="auth-link font-small" style="color: var(--accent-blue); text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Return to Main Terminal</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            const msgEl = document.getElementById("message");
            msgEl.className = "message-box error";
            msgEl.textContent = "Error: Invalid or missing account restoration token.";
            document.getElementById("reset-form").style.display = "none";
        }

        async function handleResetSubmit(e) {
            e.preventDefault();
            const password = document.getElementById("new-password").value;
            const confirm_password = document.getElementById("confirm-password").value;
            const msgEl = document.getElementById("message");
            
            msgEl.style.display = "none";

            if (password !== confirm_password) {
                msgEl.className = "message-box error";
                msgEl.textContent = "Passwords do not match.";
                msgEl.style.display = "block";
                return;
            }

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password, confirm_password })
                });

                const data = await response.json();

                if (!response.ok) {
                    msgEl.className = "message-box error";
                    msgEl.textContent = data.message || "Failed to reset password.";
                    msgEl.style.display = "block";
                } else {
                    msgEl.className = "message-box success";
                    msgEl.textContent = data.message || "Passkey successfully restored! Redirecting...";
                    msgEl.style.display = "block";
                    document.getElementById("reset-form").style.display = "none";
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                }
            } catch (err) {
                msgEl.className = "message-box error";
                msgEl.textContent = "Network connection failed. Try again.";
                msgEl.style.display = "block";
            }
        }
    </script>
</body>
</html>
